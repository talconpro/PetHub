name: Pet Submission
description: Submit a new Codex Pet to PetHub
title: "[Pet Submission]: "
labels:
  - pet-submission
  - needs-review
body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting a Pet to PetHub!

        Please read the Pet Submission Guide before submitting:
        `docs/PET_SUBMISSION_GUIDE.md`

        A complete Pet should eventually include:

        ```text
        pets/<pet-id>/
        ├─ index.png
        ├─ spritesheet.webp
        └─ pet.json
        ```

  - type: input
    id: pet_id
    attributes:
      label: Pet ID
      description: Use lowercase kebab-case. This must match the folder name under `pets/`.
      placeholder: neonfox
    validations:
      required: true

  - type: input
    id: display_name
    attributes:
      label: Display Name
      description: Human-readable name shown in the gallery.
      placeholder: NeonFox
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: Short description of the Pet. Preferably under 160 characters.
      placeholder: A cyberpunk fox hacker pet with neon techwear, bright ears, and a tiny wrist deck.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      description: Choose the closest category.
      options:
        - Beast
        - Robot
        - Spirit
        - Plant
        - Aquatic
        - Mythic
        - Slime
        - Geometric
        - Other
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags. Use 1–6 lowercase tags.
      placeholder: fox, cyberpunk, hacker
    validations:
      required: false

  - type: input
    id: author
    attributes:
      label: Author / Creator
      description: GitHub handle or creator name.
      placeholder: "@your-github-name"
    validations:
      required: true

  - type: input
    id: license
    attributes:
      label: Asset License
      description: Example: MIT, CC-BY-4.0, CC0-1.0, Custom.
      placeholder: MIT
    validations:
      required: true

  - type: input
    id: accent
    attributes:
      label: Accent Color
      description: Optional hex color used by the gallery card.
      placeholder: "#00d992"
    validations:
      required: false

  - type: textarea
    id: manifest
    attributes:
      label: pet.json
      description: Paste your proposed manifest JSON here.
      render: json
      value: |
        {
          "id": "neonfox",
          "displayName": "NeonFox",
          "description": "A cyberpunk fox hacker pet with neon techwear, bright ears, and a tiny wrist deck.",
          "spritesheetPath": "spritesheet.webp",
          "previewPath": "index.png",
          "category": "Beast",
          "species": "codex.pet",
          "tags": ["fox", "cyberpunk", "hacker"],
          "author": "@your-github-name",
          "version": "1.0.0",
          "license": "MIT",
          "accent": "#00d992"
        }
    validations:
      required: true

  - type: textarea
    id: assets
    attributes:
      label: Asset Uploads or Links
      description: Upload `index.png` and `spritesheet.webp`, or provide links to the files.
      placeholder: |
        index.png: upload or link here
        spritesheet.webp: upload or link here
    validations:
      required: true

  - type: textarea
    id: animation_states
    attributes:
      label: Animation States
      description: List the animation states included in your spritesheet, if known.
      placeholder: |
        idle: row 1, 8 frames
        running: row 2, 8 frames
        waiting: row 3, 8 frames
    validations:
      required: false

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: I created this Pet myself, or I have the right to share it.
          required: true
        - label: This Pet does not copy copyrighted characters, trademarked mascots, logos, or unauthorized assets.
          required: true
        - label: This Pet does not contain offensive, discriminatory, adult, extremist, illegal, or hateful content.
          required: true
        - label: I included or linked `index.png`.
          required: true
        - label: I included or linked `spritesheet.webp`.
          required: true
        - label: The provided `pet.json` is valid JSON.
          required: true
        - label: The `id` in `pet.json` matches the proposed folder name.
          required: true

  - type: textarea
    id: notes
    attributes:
      label: Additional Notes
      description: Anything else maintainers should know?
      placeholder: Optional notes, credits, or implementation details.
    validations:
      required: false
