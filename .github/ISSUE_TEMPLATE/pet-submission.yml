name: Pet Submission
description: Submit a new Codex Pet to PetHub
title: "[Pet Submission]: "
labels: ["pet-submission", "needs-review"]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for submitting a Pet to PetHub!

        Required files:

        ```text
        pets/<pet-id>/
        ├─ index.png
        ├─ spritesheet.webp
        └─ pet.json
        ```

  - type: input
    id: pet_id
    attributes:
      label: Pet ID
      description: Use lowercase kebab-case. Must match the folder name.
      placeholder: neonfox
    validations:
      required: true

  - type: input
    id: display_name
    attributes:
      label: Display Name
      placeholder: NeonFox
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      placeholder: A cyberpunk fox hacker pet with neon techwear.
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Beast
        - Robot
        - Spirit
        - Plant
        - Aquatic
        - Mythic
        - Slime
        - Geometric
        - Other
    validations:
      required: true

  - type: input
    id: tags
    attributes:
      label: Tags
      description: Comma-separated tags.
      placeholder: fox, cyberpunk, hacker

  - type: input
    id: author
    attributes:
      label: Author / Creator
      placeholder: "@your-github-name"
    validations:
      required: true

  - type: input
    id: license
    attributes:
      label: Asset License
      placeholder: MIT
    validations:
      required: true

  - type: textarea
    id: manifest
    attributes:
      label: pet.json
      description: Paste your proposed pet.json here.
      render: json
      placeholder: |
        {
          "id": "neonfox",
          "displayName": "NeonFox",
          "description": "A cyberpunk fox hacker pet with neon techwear.",
          "spritesheetPath": "spritesheet.webp",
          "previewPath": "index.png",
          "category": "Beast",
          "species": "codex.pet",
          "tags": ["fox", "cyberpunk", "hacker"],
          "author": "@your-github-name",
          "version": "1.0.0",
          "license": "MIT",
          "accent": "#00d992"
        }
    validations:
      required: true

  - type: textarea
    id: assets
    attributes:
      label: Asset Uploads or Links
      description: Upload or link index.png and spritesheet.webp.
      placeholder: |
        index.png:
        spritesheet.webp:
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Submission Checklist
      options:
        - label: I created this Pet myself, or I have the right to share it.
          required: true
        - label: This Pet does not copy copyrighted characters, trademarked mascots, logos, or unauthorized assets.
          required: true
        - label: This Pet does not contain offensive, discriminatory, adult, extremist, illegal, or hateful content.
          required: true
        - label: I included or linked index.png.
          required: true
        - label: I included or linked spritesheet.webp.
          required: true
        - label: The provided pet.json is valid JSON.
          required: true
